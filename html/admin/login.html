<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Cireng A'Paweh Admin</title>
    
    <!-- Global CSS & Fonts -->
    <link rel="stylesheet" href="../../css/global.css" />
    
    <!-- Admin Login CSS -->
    <link rel="stylesheet" href="../../css/admin/login.css" />
  </head>
  <body>
    <div class="loginContainer">
      <!-- Background Shapes -->
      <div class="bgShapeRed"></div>
      <div class="bgShapeYellow"></div>

      <!-- Logo (Outside Card) -->
      <div class="logoSection">
        <img src="../../assets/img/logo_cireng.png" alt="Cireng A'Paweh Logo" class="logo" />
      </div>

      <!-- Login Card -->
      <div class="loginCard">
        <!-- Title -->
        <h2 class="loginTitle">Silakan log in untuk mengakses admin dashboard</h2>

        <!-- Form -->
        <form class="loginForm" id="loginForm">
          <!-- Email Input -->
          <div class="formGroup">
            <input
              type="email"
              id="email"
              placeholder="Masukkan Email Anda"
              class="formInput"
              required
            />
          </div>

          <!-- Password Input -->
          <div class="formGroup">
            <div class="passwordInputWrapper">
              <input
                type="password"
                id="password"
                placeholder="Password..."
                class="formInput passwordInput"
                required
              />
              <button
                type="button"
                class="togglePasswordBtn"
                id="togglePasswordBtn"
                aria-label="Toggle password visibility"
              >
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
          </div>

          <!-- Remember Me Checkbox -->
          <div class="checkboxGroup">
            <input type="checkbox" id="rememberMe" class="checkbox" />
            <label for="rememberMe" class="checkboxLabel">Ingat saya</label>
          </div>

          <!-- Login Button -->
          <button type="submit" class="loginButton">Log In</button>
        </form>
      </div>
    </div>

    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Login JS -->
    <script src="../../js/admin/login.js"></script>
  </body>
</html>
